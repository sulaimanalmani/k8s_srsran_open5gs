apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app.kubernetes.io/name: mongodb
spec:
  serviceName: mongodb
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
    spec:
      serviceAccountName: mongodb
      securityContext:
        # Official image writes to /data/db. We'll ensure it’s writable.
        fsGroup: 999
        sysctls: []
      containers:
        - name: mongodb
          image: mongo:4.4.28-focal
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          ports:
            - name: mongodb
              containerPort: 27017
          # Simple "ping" probes that work without auth
          livenessProbe:
            exec:
              command:
                - bash
                - -ec
                - |
                  mongo --norc --quiet --eval "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - bash
                - -ec
                - |
                  mongo --norc --quiet --eval "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          resources:
            limits: {}
            requests: {}
          volumeMounts:
            - name: datadir
              mountPath: /data/db
      # If your PV is pre-provisioned with different ownership/permissions,
      # this initContainer will fix it. Safe to keep; it’s a no-op if already correct.
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /data/db || true"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: datadir
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: "1Gi"
        # storageClassName: local-storage
